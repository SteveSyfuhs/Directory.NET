apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-web
  namespace: directory-net
  labels:
    app.kubernetes.io/name: directory-net
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: directory-net
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: directory-net
        app.kubernetes.io/component: web
    spec:
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: web
          image: ghcr.io/directory-net/web:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DOTNET_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: "https://+:443;http://+:80"
            - name: CosmosDb__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: directory-net-secrets
                  key: cosmosdb-connection-string
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /app/appsettings.Production.json
              subPath: web-appsettings.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: directory-net-config
