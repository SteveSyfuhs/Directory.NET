apiVersion: v1
kind: Secret
metadata:
  name: directory-net-secrets
  namespace: directory-net
  labels:
    app.kubernetes.io/name: directory-net
type: Opaque
stringData:
  # IMPORTANT: Replace with your actual Cosmos DB connection string before applying.
  # Alternatively, use: kubectl create secret generic directory-net-secrets \
  #   --from-literal=cosmosdb-connection-string="YOUR_CONNECTION_STRING" \
  #   -n directory-net
  cosmosdb-connection-string: "REPLACE_WITH_COSMOSDB_CONNECTION_STRING"
