version: '3.8'

services:
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: cosmos-emulator
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      - AZURE_COSMOS_EMULATOR_PARTITION_COUNT=10
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE=true
      - AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE=cosmos-emulator
    volumes:
      - cosmos-data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks:
      - directory-net

  redis:
    image: redis:7-alpine
    container_name: directory-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - directory-net

  directory-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: directory-server
    ports:
      - "389:389"     # LDAP
      - "636:636"     # LDAPS
      - "88:88"       # Kerberos
      - "53:53/tcp"   # DNS TCP
      - "53:53/udp"   # DNS UDP
      - "1135:1135"   # RPC EPM
      - "49664:49664" # RPC Service
      - "3268:3268"   # Global Catalog
      - "3269:3269"   # Global Catalog TLS
      - "464:464"     # Kpasswd
      - "9389:9389"   # DRS HTTP
    environment:
      # CosmosDB connection for directory data store
      - CosmosDb__ConnectionString=AccountEndpoint=https://cosmos-emulator:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - CosmosDb__DatabaseName=DirectoryService
      # Redis cache connection
      - Cache__RedisConnectionString=directory-redis:6379
      # RPC endpoint mapper port
      - RpcServer__EndpointMapperPort=1135
    volumes:
      - server-data:/app/data
    depends_on:
      cosmos-emulator:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - directory-net

  directory-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: directory-web
    ports:
      - "6001:6001"
    environment:
      # ASP.NET Core URL binding
      - ASPNETCORE_URLS=https://+:6001
      # CosmosDB connection for directory data store
      - CosmosDb__ConnectionString=AccountEndpoint=https://cosmos-emulator:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - CosmosDb__DatabaseName=DirectoryService
      # Redis cache connection
      - Cache__RedisConnectionString=directory-redis:6379
    volumes:
      - web-data:/app/data
    depends_on:
      cosmos-emulator:
        condition: service_healthy
      redis:
        condition: service_healthy
      directory-server:
        condition: service_started
    restart: unless-stopped
    networks:
      - directory-net

volumes:
  cosmos-data:
  redis-data:
  server-data:
  web-data:

networks:
  directory-net:
    driver: bridge
