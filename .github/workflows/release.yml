name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Directory.Web/ClientApp/package-lock.json

      - name: Publish Server (Windows x64)
        run: dotnet publish src/Directory.Server -c Release -o publish/server-win --self-contained -r win-x64

      - name: Publish Server (Linux x64)
        run: dotnet publish src/Directory.Server -c Release -o publish/server-linux --self-contained -r linux-x64

      - name: Publish Web (Windows x64)
        run: dotnet publish src/Directory.Web -c Release -o publish/web-win --self-contained -r win-x64

      - name: Publish Web (Linux x64)
        run: dotnet publish src/Directory.Web -c Release -o publish/web-linux --self-contained -r linux-x64

      - name: Build frontend
        working-directory: src/Directory.Web/ClientApp
        run: |
          npm ci
          npm run build

      - name: Copy frontend to Web publish output
        run: |
          cp -r src/Directory.Web/ClientApp/dist/* publish/web-win/wwwroot/ 2>/dev/null || true
          cp -r src/Directory.Web/ClientApp/dist/* publish/web-linux/wwwroot/ 2>/dev/null || true

      - name: Create archives
        run: |
          cd publish
          tar -czf directory-server-win-x64.tar.gz -C server-win .
          tar -czf directory-server-linux-x64.tar.gz -C server-linux .
          tar -czf directory-web-win-x64.tar.gz -C web-win .
          tar -czf directory-web-linux-x64.tar.gz -C web-linux .
          cd server-win && zip -r ../directory-server-win-x64.zip . && cd ..
          cd web-win && zip -r ../directory-web-win-x64.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/directory-server-win-x64.tar.gz
            publish/directory-server-win-x64.zip
            publish/directory-server-linux-x64.tar.gz
            publish/directory-web-win-x64.tar.gz
            publish/directory-web-win-x64.zip
            publish/directory-web-linux-x64.tar.gz

  docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
